<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <rect width="100" height="100" rx="22" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
  </defs>
  <!-- Card shape -->
  <rect x="16" y="32" width="68" height="42" rx="7" fill="white" fill-opacity="0.95"/>
  <!-- Magnetic stripe -->
  <rect x="16" y="46" width="68" height="10" fill="#1a73e8" fill-opacity="0.18"/>
  <!-- Chip -->
  <rect x="24" y="37" width="14" height="10" rx="2" fill="#FFD600" fill-opacity="0.9"/>
  <!-- Contactless lines -->
  <path d="M46 39 Q50 42 46 45" stroke="#1a73e8" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M50 37 Q56 42 50 47" stroke="#1a73e8" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.35"/>
  <!-- Small dots for card number -->
  <circle cx="26" cy="60" r="2.5" fill="#1a73e8" fill-opacity="0.35"/>
  <circle cx="33" cy="60" r="2.5" fill="#1a73e8" fill-opacity="0.35"/>
  <circle cx="40" cy="60" r="2.5" fill="#1a73e8" fill-opacity="0.35"/>
  <circle cx="47" cy="60" r="2.5" fill="#1a73e8" fill-opacity="0.35"/>
  <!-- Logo circle -->
  <circle cx="68" cy="60" r="6" fill="#FF5252" fill-opacity="0.85"/>
  <circle cx="74" cy="60" r="6" fill="#FFD600" fill-opacity="0.85"/>
</svg>
